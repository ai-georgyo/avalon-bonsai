name: Nix

# Builds the client bundle hermetically from the opam-nix flake (flake.nix). This compiles
# the OxCaml compiler and the Jane Street Bonsai preview packages from the oxcaml
# opam-repository, so the FIRST run on a cold cache is very slow (tens of minutes). The Nix
# store is cached to the GitHub Actions cache, so subsequent runs reuse the toolchain and are
# fast. For heavy use, point this at a Cachix cache instead (the GHA cache is capped at 10 GB
# per repo, and the OxCaml closure is large).
#
# `--impure` is required: several oxcaml preview packages use git sources without a pinned
# sha1, which opam-nix can only fetch in impure mode. flake.lock still pins the opam repos
# themselves, so resolution is reproducible even though those few sources are fetched live.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref — a cold OxCaml build is too expensive to waste.
concurrency:
  group: nix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix (flakes enabled)
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Cache the Nix store (the OxCaml toolchain is expensive to rebuild)
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock', 'flake.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Build the flake (client bundle + avalon_core unit tests)
        # doCheck = true in the derivation runs `dune runtest test`, so this builds and tests.
        run: nix build --impure --print-build-logs .#default

      - name: Stage the client bundle
        run: |
          mkdir -p dist
          cp -L result/* dist/

      - name: Upload the client bundle
        uses: actions/upload-artifact@v4
        with:
          name: avalon-bonsai-client
          path: dist/
