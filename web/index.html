<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Avalon</title>

    <!-- Icon fonts (replacing Vuetify's fa-svg + MDI) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <!-- App styles are injected at runtime by ppx_css (see src/style.ml). -->

    <!-- Firebase v12 *modular* SDK is loaded by the app itself via dynamic import()
         (see Firebase.on_ready in firebase/firebase.ml). These modulepreload hints just let
         the browser fetch the entry points in parallel with main.bc.js; keep the version in
         sync with firebasejs_base there. -->
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js" />
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js" />
    <link rel="modulepreload" href="https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js" />
  </head>
  <body>
    <div id="app"></div>
    <script defer src="main.bc.js"></script>
  </body>
</html>
