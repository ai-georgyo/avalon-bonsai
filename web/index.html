<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Avalon</title>

    <!-- Icon fonts (replacing Vuetify's fa-svg + MDI) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <!-- App styles are injected at runtime by ppx_css (see src/style.ml). -->

    <!-- Tree-shaken, self-hosted Firebase v12 modular bundle (built from firebase/shim/).
         Populates window.__fb and dispatches `firebase-ready`; the OCaml side
         (Firebase.on_ready) waits for it. Self-hosted = no runtime gstatic.com dependency. -->
    <script defer src="firebase-shim.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <script defer src="main.bc.js"></script>
  </body>
</html>
