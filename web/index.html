<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Avalon</title>

    <!-- Icon fonts (replacing Vuetify's fa-svg + MDI) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
    <!-- App styles are injected at runtime by ppx_css (see src/style.ml). -->

    <!-- Firebase v12 *modular* SDK. No bundler, so import the ESM build and re-export the
         functions our bindings need on window.__fb, then signal readiness. The OCaml side
         (Firebase.on_ready) waits for this before initializing. -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-app.js";
      import {
        getAuth, onAuthStateChanged, signInAnonymously,
        signInWithEmailLink, sendSignInLinkToEmail, signOut,
      } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-auth.js";
      import {
        getFirestore, doc, onSnapshot, getDoc,
      } from "https://www.gstatic.com/firebasejs/12.3.0/firebase-firestore.js";
      window.__fb = {
        initializeApp,
        getAuth, onAuthStateChanged, signInAnonymously,
        signInWithEmailLink, sendSignInLinkToEmail, signOut,
        getFirestore, doc, onSnapshot, getDoc,
      };
      window.dispatchEvent(new Event("firebase-ready"));
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script defer src="main.bc.js"></script>
  </body>
</html>
